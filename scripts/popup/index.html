<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <img src="/assets/newicon.png" alt="Readel" class="logo-icon-img">
        <span class="logo-text">Readel</span>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Voice</span>
        </div>
        <div class="select-wrapper">
          <select id="voice-select" class="select" aria-label="Select voice">
            <option value="71a7ad14-091c-4e8e-a314-022ece01c121">British Reading Lady</option>
            <option value="f146dcec-e481-45be-8ad2-96e1e40e7f32">Reading Man</option>
            <option value="79f8b5fb-2cc8-479a-80df-29f7a7cf1a3e">Nonfiction Man</option>
            <option value="00a77add-48d5-4ef6-8157-71e5437b282d">Calm Lady</option>
            <option value="69267136-1bdc-412f-ad78-0caad210fb40">Friendly Reading Man</option>
            <option value="d46abd1d-2d02-43e8-819f-51fb652c1c61">Newsman</option>
          </select>
          <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Speed</span>
          <span id="speed-value" class="control-value">1x</span>
        </div>
        <input type="range" id="speed-slider" min="0" max="100" step="1" value="33" class="range" aria-label="Playback speed">
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Volume</span>
          <span id="volume-value" class="control-value">50%</span>
        </div>
        <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5" class="range" aria-label="Volume">
      </div>
    </div>

    <div class="controls" style="margin-top: 8px;">
      <div class="control-group">
        <div class="control-header">
          <span class="control-label">Shortcut</span>
          <span id="hotkey-reset" class="control-value" style="cursor: pointer; color: #3b82f6;">reset</span>
        </div>
        <button id="hotkey-picker" class="hotkey-picker" aria-label="Set keyboard shortcut">
          <span id="hotkey-display">Alt</span>
        </button>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <label class="toggle-row">
          <span class="control-label" style="margin-bottom: 0;">Auto-scroll</span>
          <input type="checkbox" id="autoscroll-toggle" class="toggle" checked>
        </label>
      </div>

      <div class="divider"></div>

      <div class="control-group">
        <label class="toggle-row">
          <span class="control-label" style="margin-bottom: 0;">Subtitles</span>
          <input type="checkbox" id="subtitles-toggle" class="toggle">
        </label>
      </div>
    </div>

    <div class="footer">
      <div class="shortcut-hint">
        Hold shortcut to read. Double tap for continuous.
      </div>
      <div id="response-time" class="response-time"></div>
    </div>
  </div>

  <script src="/scripts/popup/popup.js"></script>
</body>
</html>
