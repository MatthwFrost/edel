<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF — Readel</title>
    <link rel="stylesheet" href="viewer.css">
</head>
<body>
    <div id="toolbar">
        <div id="toolbar-left">
            <button id="prev" title="Previous page" disabled>
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 10l4-4 4 4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </button>
            <span id="pageinfo">
                <input id="pageinput" type="text" value="1" size="3">
                <span id="pagetotal">/ 1</span>
            </span>
            <button id="next" title="Next page" disabled>
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </button>
            <div class="sep"></div>
            <button id="zoomout" title="Zoom out">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8h10" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <span id="zoomlevel">100%</span>
            <button id="zoomin" title="Zoom in">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8h10M8 3v10" stroke="currentColor" stroke-width="1.5"/></svg>
            </button>
            <div class="sep"></div>
            <button id="fitwidth" title="Fit to width">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M1 8h14M4 5l-3 3 3 3M12 5l3 3-3 3" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
            </button>
        </div>
        <div id="toolbar-center">
            <span id="title"></span>
        </div>
        <div id="toolbar-right">
            <button id="print" title="Print">
                <svg width="16" height="16" viewBox="0 0 16 16"><rect x="4" y="1" width="8" height="4" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="1" y="5" width="14" height="6" rx="1" stroke="currentColor" fill="none" stroke-width="1.2"/><rect x="4" y="9" width="8" height="6" stroke="currentColor" fill="none" stroke-width="1.2"/></svg>
            </button>
            <button id="download" title="Download">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 1v9M5 7l3 3 3-3M3 13h10" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </button>
            <div class="sep"></div>
            <button id="openchrome" title="Open in Chrome viewer">
                <svg width="16" height="16" viewBox="0 0 16 16"><path d="M6 2H2v12h12v-4M9 2h5v5M8 8L14 2" stroke="currentColor" stroke-width="1.3" fill="none"/></svg>
            </button>
        </div>
    </div>
    <div id="loading">Loading PDF…</div>
    <div id="error"></div>
    <div id="viewer-wrapper">
        <div id="viewer"></div>
    </div>
    <script type="module" src="viewer.js"></script>
</body>
</html>
